<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yourscent Import</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" href="img/LogoYourscentImport.png">
</head>
<body>
  <header>
    <div class="header-container">
      <img src="img/LogoYourscentImport.png" class="logo" />
      <h1>Yourscent Import</h1>
    </div>

  <section class="filters">

      <button onclick="filterProducts('unissex')">Unissex</button>

    </div>

      <button class="filter-btn" onclick="toggleDropdown()">
        Marcas ▼
      </button>

      <div id="dropdown-marcas" class="dropdown-content">

        <label><input type="checkbox" value="Dolce-&-Gabbana"> Dolce & Gabbana</label>
        <label><input type="checkbox" value="&Honey"> &Honey</label>
        <label><input type="checkbox" value="Fragrance-by-Sabrina"> Fragrance by Sabrina</label>
        <label><input type="checkbox" value="French-Avenue"> French Avenue</label>
        <label><input type="checkbox" value="Gucci"> Gucci</label>
        <label><input type="checkbox" value="Giorgio-Armani"> Giorgio Armani</label>
        <label><input type="checkbox" value="JBL"> JBL</label>        
        <label><input type="checkbox" value="Jean-Paul-Gaultier">Jean Paul Gaultier</label>
        <label><input type="checkbox" value="Lancôme"> Lancôme</label>
        <label><input type="checkbox" value="Lattafa"> Lattafa</label>
        <label><input type="checkbox" value="Maison-Alhambra"> Maison Alhambra</label>
        <label><input type="checkbox" value="Maison-Asrar"> Maison Asrar</label>
        <label><input type="checkbox" value="Marc-Jacobs"> Marc Jacobs</label>
        <label><input type="checkbox" value="Medicube"> Medicube</label>
        <label><input type="checkbox" value="Moschino"> Moschino</label>
        <label><input type="checkbox" value="Orientica"> Orientica</label>
        <label><input type="checkbox" value="Paris-Corner"> Paris Corner</label>
        <label><input type="checkbox" value="Paco-Rabanne"> Paco Rabanne</label>
        <label><input type="checkbox" value="Prada"> Prada</label>
        <label><input type="checkbox" value="Ralph-Lauren"> Ralph Lauren</label>

        <label><input type="checkbox" value="Yves-Saint-Laurent"> Yves Saint Laurent</label>
      </div>
    </div>

  <section class="carousel">
    <div class="carousel-container" id="carousel-container"></div>
    <button class="carousel-btn prev" onclick="prevSlide()">❮</button>
    <button class="carousel-btn next" onclick="nextSlide()">❯</button>
    <div class="carousel-dots" id="carousel-dots"></div>
  </section>

  <section id="products" class="grid"></section>

  <div class="footer">
    <h3>Pagamento à vista ou parcelado em até 3x sem juros!</h3>

    <p>Entre em contato para mais informações sobre preços e disponibilidade</p>
    <p>(46) 9 9982-7906</p>
